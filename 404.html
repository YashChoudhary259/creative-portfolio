<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .not-found {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 2rem;
      background: #0f0f0f;
      color: #ccc;
    }

    .not-found h1 {
      font-size: 5rem;
      margin-bottom: 1rem;
      color: #7ab6f9;
    }

    .not-found p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
    }

    .not-found a {
      display: inline-block;
      padding: 0.7rem 1.4rem;
      background-color: #7ab6f9;
      color: #0f0f0f;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: background-color 0.3s ease;
    }

    .not-found a:hover {
      background-color: #539de0;
    }
  </style>
</head>
<body>
  <div class="not-found">
    <h1>404</h1>
    <p>Oops! The page you're looking for doesn't exist.</p>
    <a href="index.html">Return Home</a>
  </div>
</body>
</html>
